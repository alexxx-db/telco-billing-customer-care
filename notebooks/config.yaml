domain_agent_prompt_section: "\n  Domain context (Telecommunications):\n  - You are\
  \ a Billing Support Agent for a Telecommunications provider.\n  - Refer to customers\
  \ as \"subscriber\".\n  - The billing service is called a \"plan\".\n  - Charge\
  \ categories: charge_category_1=Data Overage, charge_category_2=Roaming Data, charge_category_3=Roaming\
  \ Calls, charge_category_4=Roaming Texts, charge_category_5=International Calls,\
  \ charge_category_6=International Texts\n  - NEVER share these fields: customer_name,\
  \ email, account_identifier, product_identifier.\n"
personas:
  customer_care:
    display_name: Customer Care
    ui_label: Customer Support
    ui_description: Handle individual customer billing inquiries, disputes, and plan
      questions.
    write_access: full
    allowed_tools:
    - billing_faq
    - lookup_billing
    - lookup_billing_items
    - lookup_billing_plans
    - lookup_customer
    - lookup_billing_anomalies
    - lookup_dispute_history
    - lookup_customer_erp_profile
    - lookup_revenue_attribution
    - ask_billing_analytics
    - get_monitoring_status
    - request_write_confirmation
    - acknowledge_anomaly
    - create_billing_dispute
    - update_dispute_status
    starter_prompts: []
  finance_ops:
    display_name: Finance Operations
    ui_label: Finance & Analytics
    ui_description: Fleet-wide billing analytics, revenue attribution, AR health,
      and anomaly operations.
    write_access: acknowledge_only
    allowed_tools:
    - ask_billing_analytics
    - get_monitoring_status
    - get_finance_operations_summary
    - lookup_operational_kpis
    - lookup_job_reliability
    - lookup_open_disputes
    - lookup_write_audit
    - lookup_billing_anomalies
    - lookup_billing
    - lookup_customer
    - lookup_revenue_attribution
    - lookup_customer_erp_profile
    - request_write_confirmation
    - acknowledge_anomaly
    starter_prompts:
    - What is our total billing revenue this month vs last month?
    - How many CRITICAL anomalies are unacknowledged right now?
    - Show me the OPEX ratio trend for the last 6 months.
    - Which customer segments have the highest overdue AR ratio?
  executive:
    display_name: Executive Briefing
    ui_label: Executive View
    ui_description: High-level billing performance summaries for CFO and senior leadership.
    write_access: none
    allowed_tools:
    - ask_billing_analytics
    - get_finance_operations_summary
    - get_monitoring_status
    starter_prompts:
    - Give me a billing health summary for this month.
    - What are the top billing risks I should know about?
    - What is our anomaly exposure this quarter?
  technical:
    display_name: Technical / Engineering
    ui_label: Platform Engineering
    ui_description: Billing pipeline health, DBU costs, job reliability, and data
      engineering diagnostics.
    write_access: none
    allowed_tools:
    - lookup_operational_kpis
    - lookup_job_reliability
    - get_monitoring_status
    - ask_billing_analytics
    - lookup_write_audit
    starter_prompts:
    - Is the billing anomaly detection pipeline healthy?
    - What is our DBU consumption and estimated cost this week?
    - Show me job reliability for our billing pipelines in the last 30 days.
    - What write operations has the agent performed in the last 24 hours?
