bundle:
  name: billing_intelligence_app

resources:
  apps:
    billing_intelligence:
      name: billing-intelligence-${bundle.target}
      description: "Customer Billing Intelligence App (${bundle.target})"
      source_code_path: .

targets:
  dev:
    default: true
    mode: development
    workspace:
      host: https://your-dev-workspace.cloud.databricks.com

  prod:
    mode: production
    workspace:
      host: https://your-prod-workspace.cloud.databricks.com
